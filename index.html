 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Birthday Wishes from Sasi</title>

  <style>
    :root { --accent:#ff3366; }
    html,body { height:100%; margin:0; }

    body {
      background: url("swarnasis.jpg") center / cover no-repeat fixed;
      background-color: rgba(255,255,255,0.6);
      background-blend-mode: lighten;
      font-family: "Segoe UI", Arial, sans-serif;
      text-align: center;
      padding: 50px;
      min-height: 100vh;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    h1 {
      color: var(--accent);
      font-size: 42px;
      margin-bottom: 10px;
    }

    input, button {
      padding: 12px 18px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      transition: transform .15s ease;
    }

    button:hover { transform: scale(1.05); }
    .hidden { display:none; }

    .letter {
      font-size: 20px;
      margin: 30px auto;
      color: #222;
      max-width: 700px;
      line-height: 1.45;
      white-space: pre-line;
      background: rgba(255,255,255,0.95);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .typing {
      display:inline-block;
      overflow:hidden;
      vertical-align: top;
      border-right: 2px solid #555;
      animation: typing 3s steps(40,end), blink 0.75s step-end infinite;
      white-space: pre-line;
      width:0;
      box-sizing: content-box;
    }

    @keyframes typing { from { width:0 } to { width:100% } }
    @keyframes blink { from,to { border-color:transparent } 50%{ border-color:#555 } }

    #musicBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,.2);
      border: none;
    }
  </style>
</head>

<body style="background-image=url('swarnasis.jpg');">

  <audio id="bgMusic" src="Heeriye-Arijit-Singh.mp3" loop></audio>
  <button id="musicBtn">▶️</button>

  <div id="page1">
    <h1>🎂 Birthday Wishes from Sasi 🎂</h1>
    <p>Enter your friend’s name:</p>
    <input type="text" id="nameInput" placeholder="Enter name">
    <br>
    <button onclick="goToPage2()">Next</button>
  </div>

  <div id="page2" class="hidden">
    <h1>Pick a letter style for <span id="personName"></span></h1>
    <button onclick="showLetter(1)">Letter 1 💌</button>
    <button onclick="showLetter(2)">Letter 2 🤪</button>
  </div>

  <div id="page3" class="hidden">
    <div class="letter">
      <div id="letterContent"></div>
    </div>
    <button onclick="showFinalPage()">Next ➡️</button>
  </div>

  <div id="page4" class="hidden">
    <h1>🎉 Enjoy the Birthday! 🎉</h1>
    <p class="letter">
      Enjoy the birthday with full of joy. <br>
      I am your side always forever. <br><br>
      — <strong>shyness_boy_sasi_</strong>
    </p>
  </div>

<script>
let name = "";
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

btn.addEventListener("click", () => {
  if (music.paused) {
    music.play();
    btn.textContent = "⏸️";
  } else {
    music.pause();
    btn.textContent = "▶️";
  }
});

function goToPage2() {
  name = document.getElementById("nameInput").value.trim();
  if (!name) return alert("Please enter a name!");
  document.getElementById("personName").innerText = name;
  swap("page1","page2");
}

const letter1 = `Happy Birthday, ${"${name}"}! 🎉

Wishing you a day full of love, laughter, and happiness.
Thank you for all the memories, fun, and moments we shared.

With love,
— shyness_boy_sasi_`;

const letter2 = `Hey ${"${name}"}! 😜

Happy Birthday to my favorite chaos partner!
Thanks for stealing my food and annoying me daily.
But still, I love you!

— shyness_boy_sasi_`;

function showLetter(opt){
  const raw = opt === 1 ? letter1 : letter2;
  const text = raw.replace(/\$\{name\}/g, name);

  const box = document.getElementById("letterContent");
  box.classList.remove("typing");
  box.innerText = "";
  
  setTimeout(() => {
    box.innerText = text;
    box.classList.add("typing");
  }, 50);

  swap("page2","page3");
}

function showFinalPage(){
  swap("page3","page4");
}

function swap(h, s){
  document.getElementById(h).classList.add("hidden");
  document.getElementById(s).classList.remove("hidden");
}

document.addEventListener("click", () => music.play(), {once:true});
</script>

</body>
</html>
